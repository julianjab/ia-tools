default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, chore, docs, refactor, test, build, ci, perf, style, revert]

  - repo: local
    hooks:
      - id: biome-check
        name: biome check (lint + format + re-stage)
        language: system
        entry: bash -c 'pnpm exec biome check --write --no-errors-on-unmatched "$@" && git add "$@"' --
        types_or: [ts, tsx, js, jsx, json, jsonc]
        pass_filenames: true

      - id: slack-bridge-dist-fresh
        name: slack-bridge dist is in sync with src
        language: system
        entry: bash scripts/check-slack-bridge-dist.sh
        pass_filenames: false
        files: ^plugins/slack-bridge/(src/|tsconfig\.json|package\.json|dist/)
