default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, chore, docs, refactor, test, build, ci, perf, style, revert]

  - repo: local
    hooks:
      - id: biome-check
        name: biome check (lint + format + re-stage)
        language: system
        entry: bash -c 'pnpm exec biome check --write --no-errors-on-unmatched "$@" && git add "$@"' --
        types_or: [ts, tsx, js, jsx, json, jsonc]
        pass_filenames: true

      - id: validate-agents
        name: validate agents & skills (Level 1 static)
        description: Frontmatter, tool whitelists, cross-refs, stale pointers, env var consistency.
        language: system
        entry: bash skills/validate-agents/scripts/validate.sh
        pass_filenames: false
        files: '^(agents/|skills/|hooks/|CLAUDE\.md|AGENTS\.md|README\.md)'
