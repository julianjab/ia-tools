# docker.example/k8s — example manifests for running a team-workflow
# `router` as a long-lived Kubernetes pod. NOT production-ready; adjust
# namespace, resource limits, image registry, and security context for
# your cluster.
#
# Apply:
#   # 1. tokens → Secret
#   kubectl create secret generic router-pod-secrets \
#     --from-literal=CLAUDE_CODE_OAUTH_TOKEN=... \
#     --from-literal=GITHUB_TOKEN=... \
#     --from-literal=SLACK_BOT_TOKEN=... \
#     --from-literal=SLACK_APP_TOKEN=...
#
#   # 2. pod profile (the yaml) → ConfigMap
#   kubectl create configmap router-pod-profile \
#     --from-file=team-workflow.yaml=docker.example/team-workflow.yaml
#
#   # 3. PVC + Deployment
#   kubectl apply -f docker.example/k8s/deployment.example.yaml
#
# Re-pointing the pod at a different agent/repo: edit the yaml in the
# ConfigMap and `kubectl rollout restart deployment/router-pod`. The
# entrypoint re-reads the file on boot.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: router-pod-state
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      # Holds state.md + clone-cache/. Size for the repos this pod will
      # actually clone (lazy: only the ones it touches get fetched).
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: router-pod
  labels:
    app: router-pod
spec:
  # Exactly one replica: the router is a stateful long-lived process,
  # not a horizontally-scalable service.
  replicas: 1
  strategy:
    type: Recreate            # never run two routers against one PVC
  selector:
    matchLabels:
      app: router-pod
  template:
    metadata:
      labels:
        app: router-pod
    spec:
      containers:
        - name: router
          # For a consumer-specific pod (with a baked agent), this would
          # be your derived image:
          #   FROM ia-tools-router-pod:0.x.y
          #   COPY agents/<name>.md /root/.claude/agents/<name>.md
          image: your-registry/ia-tools-router-pod:dev
          # Secrets only — the pod profile comes from the mounted yaml.
          envFrom:
            - secretRef:
                name: router-pod-secrets
          volumeMounts:
            - name: profile
              mountPath: /opt/ia-tools/.claude/team-workflow.yaml
              subPath: team-workflow.yaml
              readOnly: true
            - name: state
              mountPath: /state
          # tmux + claude need a TTY-ish stdin to stay alive.
          stdin: true
          tty: true
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          # Router is PID 1; if claude exits, restart the pod.
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "claude"]
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: profile
          configMap:
            name: router-pod-profile
        - name: state
          persistentVolumeClaim:
            claimName: router-pod-state
