# docker.example/k8s — example manifests for running a team-workflow
# `router` as a long-lived Kubernetes pod with a POD dispatch profile.
# NOT production-ready; adjust namespace, resource limits, image
# registry, and security context for your cluster.
#
# Apply:
#   kubectl create secret generic router-pod-secrets \
#     --from-literal=CLAUDE_CODE_OAUTH_TOKEN=... \
#     --from-literal=GITHUB_TOKEN=... \
#     --from-literal=SLACK_BOT_TOKEN=... \
#     --from-literal=SLACK_APP_TOKEN=...
#   kubectl apply -f docker.example/k8s/deployment.example.yaml
---
# Non-secret pod profile. THIS is "configuration by variables": editing
# this ConfigMap and restarting the pod re-points it at a different repo
# or flips it back to a worktree-local dev profile — no image rebuild.
apiVersion: v1
kind: ConfigMap
metadata:
  name: router-pod-profile
data:
  IA_TW_DISPATCH_AGENT: "team-workflow:repo-worker"
  IA_TW_DISPATCH_PROVISION: "clone"
  IA_TW_REPO_URL: "https://github.com/your-org/your-frontend-repo.git"
  IA_TW_STATE_ROOT: "/state"
  GIT_AUTHOR_NAME: "team-workflow-bot"
  GIT_AUTHOR_EMAIL: "team-workflow-bot@users.noreply.github.com"
  # Optional: auto-subscribe the router to a Slack topic at boot.
  # SLACK_TOPICS: "C0123456789"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: router-pod-state
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      # Holds state.md + one git clone per repo this pod owns. Size for
      # your repo; clones are reused across features, not re-cloned.
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: router-pod
  labels:
    app: router-pod
spec:
  # Exactly one replica: the router is a stateful long-lived process, not
  # a horizontally-scalable service. Each repo gets its own Deployment.
  replicas: 1
  strategy:
    type: Recreate            # never run two routers against one PVC
  selector:
    matchLabels:
      app: router-pod
  template:
    metadata:
      labels:
        app: router-pod
    spec:
      containers:
        - name: router
          image: your-registry/ia-tools-router-pod:dev
          # Profile from the ConfigMap, secrets from the Secret. Together
          # they are the entire pod configuration — no baked-in values.
          envFrom:
            - configMapRef:
                name: router-pod-profile
            - secretRef:
                name: router-pod-secrets
          volumeMounts:
            - name: state
              mountPath: /state
          # tmux + claude need a TTY-ish stdin to stay alive.
          stdin: true
          tty: true
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          # router is the PID-1 process; if claude exits, restart the pod.
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "claude"]
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: router-pod-state
