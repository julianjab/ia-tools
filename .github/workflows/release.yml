name: release

on:
  push:
    branches: [main]

# Single in-flight release run per branch. release-please reconciles state
# against tags + the manifest file, so cancelling intermediate runs is safe.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write          # create tags + GitHub Releases + release-please commits
  pull-requests: write     # open / update the Release PR

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

      # release-please's model is PR-based: it opens a "Release PR" with
      # version bumps + CHANGELOG entries. We squash-merge it immediately
      # so the bump lands on main without manual review. The squash-merge
      # triggers another release.yml run on main, which release-please
      # reconciles to a no-op against the updated manifest and tags.
      #
      # If branch protection on main requires status checks, this errors
      # and the PR stays open — operator either relaxes the rule or
      # merges manually.
      - name: Auto-merge the Release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pr_number=$(echo '${{ steps.release.outputs.pr }}' | jq -r '.number')
          if [ -z "$pr_number" ] || [ "$pr_number" = "null" ]; then
            echo "release-please reported no PR; nothing to merge."
            exit 0
          fi
          echo "Merging release PR #$pr_number..."
          gh pr merge "$pr_number" \
            --squash \
            --repo "${{ github.repository }}"

      # When release-please tags a real release (not just opening a release PR),
      # update .claude-plugin/marketplace.json#metadata.version to the highest
      # version among the three plugins. Uses node for cross-platform semver sort.
      - name: Checkout
        if: steps.release.outputs.releases_created == 'true'
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Sync marketplace version
        if: steps.release.outputs.releases_created == 'true'
        env:
          TW_VERSION: ${{ steps.release.outputs.team-workflow--version }}
          SB_VERSION: ${{ steps.release.outputs.slack-bridge--version }}
          SC_VERSION: ${{ steps.release.outputs.scaffold--version }}
        run: |
          latest=$(node -e "
            const vs = [process.env.TW_VERSION, process.env.SB_VERSION, process.env.SC_VERSION].filter(Boolean);
            if (!vs.length) process.exit(1);
            vs.sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));
            console.log(vs[vs.length - 1]);
          ")
          current=$(jq -r '.metadata.version' .claude-plugin/marketplace.json)
          if [ "$latest" = "$current" ]; then echo "version unchanged ($current), skipping."; exit 0; fi
          jq --arg v "$latest" '.metadata.version = $v' .claude-plugin/marketplace.json > /tmp/mp.json
          mv /tmp/mp.json .claude-plugin/marketplace.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git commit -m "chore: sync marketplace version to $latest [skip ci]"
          git push
