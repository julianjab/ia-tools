name: release

on:
  push:
    branches: [main]

# Single in-flight release run per branch. release-please reconciles state
# against tags + the manifest file, so cancelling intermediate runs is safe.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write          # create tags + GitHub Releases + release-please commits
  pull-requests: write     # open / update the Release PR

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history + tags so the backfill step can fall back to
          # `git log <prev-tag>..HEAD -- <plugin_path>` when a plugin's
          # CHANGELOG section is missing (e.g. first-ever release of a
          # newly-added plugin, or a manually-truncated changelog).
          fetch-depth: 0
          fetch-tags: true

      # release-please-action v4 (CLI v17.x) intermittently fails the final
      # "Creating releases for pull #N" step with `Resource not accessible by
      # integration` even when the GITHUB_TOKEN has `contents: write` and no
      # tag/branch ruleset blocks creation. The action's PR + manifest +
      # CHANGELOG work has already succeeded by that point; only the
      # `POST /releases` call inside the action fails. The "Backfill missing
      # releases" step below recreates any missing tag/release pair using
      # `gh release create` (same token, different code path — known to work).
      # `continue-on-error` keeps the workflow running so the backfill fires.
      - name: Run release-please
        id: release
        continue-on-error: true
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

      # Fallback: read the manifest, find any <name>-v<version> release
      # missing from the repo, and create the tag + GitHub Release using the
      # merge commit of the latest merged "chore: release main" PR as the
      # target. On a normal feature-merge push this is a no-op (all tags
      # exist). Notes are sliced from the plugin's CHANGELOG.md.
      - name: Backfill missing releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          manifest=".github/.release-please-manifest.json"
          repo="${{ github.repository }}"

          release_pr_commit=$(gh pr list \
            --repo "$repo" \
            --state merged \
            --search 'chore: release main in:title' \
            --json mergeCommit \
            --jq '.[0].mergeCommit.oid' \
            --limit 1)

          if [ -z "$release_pr_commit" ] || [ "$release_pr_commit" = "null" ]; then
            echo "No merged 'chore: release main' PR found; nothing to backfill."
            exit 0
          fi
          echo "Latest merged release PR commit: $release_pr_commit"

          missing=0
          for plugin_path in $(jq -r 'keys[]' "$manifest"); do
            name=$(basename "$plugin_path")
            version=$(jq -r --arg p "$plugin_path" '.[$p]' "$manifest")
            tag="${name}-v${version}"

            if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
              echo "✓ $tag already exists"
              continue
            fi

            missing=$((missing + 1))
            echo "→ Creating missing release $tag at $release_pr_commit"

            notes_file=$(mktemp)

            # Plan A: slice the matching `## [<version>]` section out of
            # the plugin's CHANGELOG.md (normal release-please flow).
            if [ -f "$plugin_path/CHANGELOG.md" ]; then
              awk -v ver="$version" '
                $0 ~ ("^## \\[" ver "\\]") { capture=1; next }
                capture && /^## \[/ { exit }
                capture { print }
              ' "$plugin_path/CHANGELOG.md" > "$notes_file"
            fi

            # Plan B: no CHANGELOG section (first-ever release of a new
            # plugin, or a truncated changelog). Synthesise notes from
            # the git log of commits touching the plugin path, since the
            # previous tag if any, else since the beginning of history.
            if [ ! -s "$notes_file" ]; then
              prev_tag=$(git tag -l "${name}-v*" --sort=-version:refname | head -n1)
              {
                echo "### Changes"
                echo
                if [ -n "$prev_tag" ]; then
                  git log "${prev_tag}..HEAD" \
                    --pretty=format:"* %s (%h)" \
                    -- "$plugin_path"
                else
                  echo "_First release. All commits touching \`$plugin_path\`:_"
                  echo
                  git log --pretty=format:"* %s (%h)" -- "$plugin_path"
                fi
                echo
              } > "$notes_file"
            fi

            # Plan C: even the git log came back empty (e.g. plugin moved
            # paths). Last-resort placeholder so gh release create has
            # something to publish.
            if [ ! -s "$notes_file" ]; then
              echo "Release ${name} v${version}." > "$notes_file"
            fi

            gh release create "$tag" \
              --repo "$repo" \
              --target "$release_pr_commit" \
              --title "${name}: v${version}" \
              --notes-file "$notes_file"

            rm -f "$notes_file"
          done

          if [ "$missing" -eq 0 ]; then
            echo "All manifest versions already have releases."
          fi

      # Resolve the open release PR: prefer release-please output (new/updated PR),
      # fall back to gh pr list (existing unchanged PR). This handles the case where
      # release-please finds no changes to make to an existing PR and emits no output.
      - name: Resolve release PR
        id: resolve_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_json='${{ steps.release.outputs.pr }}'
          if [ -n "$pr_json" ] && [ "$pr_json" != "null" ] && [ "$pr_json" != "false" ]; then
            pr_number=$(echo "$pr_json" | jq -r '.number')
            pr_branch=$(echo "$pr_json" | jq -r '.headBranchName')
          else
            # release-please found an existing PR with no changes — look it up
            pr_number=$(gh pr list \
              --head "release-please--branches--main" \
              --state open \
              --json number \
              --jq '.[0].number' \
              --repo "${{ github.repository }}" 2>/dev/null || echo "")
            pr_branch="release-please--branches--main"
          fi
          if [ -z "$pr_number" ] || [ "$pr_number" = "null" ]; then
            echo "no_pr=true" >> "$GITHUB_OUTPUT"
          else
            echo "no_pr=false" >> "$GITHUB_OUTPUT"
            echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
            echo "pr_branch=$pr_branch" >> "$GITHUB_OUTPUT"
          fi

      # Add marketplace.json to the release PR branch before merging so that
      # plugin version bumps and marketplace version land in one squash commit.
      # The release branch already has the updated manifest — we read from it.
      - name: Sync marketplace into release PR
        if: steps.resolve_pr.outputs.no_pr == 'false'
        run: |
          pr_branch="${{ steps.resolve_pr.outputs.pr_branch }}"
          git fetch origin "$pr_branch"
          git checkout "$pr_branch"
          latest=$(node -e "
            const m = JSON.parse(require('fs').readFileSync('.github/.release-please-manifest.json', 'utf8'));
            const vs = Object.values(m).filter(Boolean);
            vs.sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));
            console.log(vs[vs.length - 1]);
          ")
          current=$(jq -r '.metadata.version' .claude-plugin/marketplace.json)
          if [ "$latest" = "$current" ]; then echo "already at $current, skipping."; exit 0; fi
          jq --arg v "$latest" '.metadata.version = $v' .claude-plugin/marketplace.json > /tmp/mp.json
          mv /tmp/mp.json .claude-plugin/marketplace.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git commit -m "chore: sync marketplace version to $latest"
          git push origin "$pr_branch"

      # Squash-merge the release PR. Because the marketplace sync commit is
      # already on the PR branch, everything lands in one commit on main.
      - name: Auto-merge the Release PR
        if: steps.resolve_pr.outputs.no_pr == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pr_number="${{ steps.resolve_pr.outputs.pr_number }}"
          echo "Merging release PR #$pr_number..."
          gh pr merge "$pr_number" --squash --repo "${{ github.repository }}"
